name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Version from tag
        id: ver
        shell: bash
        run: echo "v=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - run: cargo build --release --target ${{ matrix.target }}
        env:
          POSTMORTEM_VERSION: ${{ steps.ver.outputs.v }}
      - name: Package archive
        shell: bash
        run: |
          mkdir dist staging
          bin="postmortemthis"
          if [ "${{ runner.os }}" = "Windows" ]; then bin="postmortemthis.exe"; fi
          cp "target/${{ matrix.target }}/release/${bin}" "staging/${bin}"
          # Archive named with the target triple so gg matches the platform;
          # the binary inside is just `postmortemthis`/`postmortemthis.exe` so gg's bin
          # patterns find it after extraction.
          if [ "${{ runner.os }}" = "Windows" ]; then
            (cd staging && 7z a "../dist/postmortemthis-${{ matrix.target }}.zip" "${bin}")
          else
            tar -czf "dist/postmortemthis-${{ matrix.target }}.tar.gz" -C staging "${bin}"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: postmortemthis.cmd
